<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ Magic Words ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #2dd4c7;
    --teal-dark: #0fa89e;
    --pink: #f472b6;
    --pink-dark: #db2777;
    --lavender: #c4b5fd;
    --gold: #fbbf24;
    --gold-light: #fef3c7;
    --coral: #fb923c;
    --mint: #6ee7b7;
    --sky: #7dd3fc;
    --bg: #0d1b2a;
    --bg2: #112240;
    --card: rgba(255,255,255,0.07);
    --card-border: rgba(255,255,255,0.15);
    --text: #f0f9ff;
    --text-soft: rgba(240,249,255,0.7);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background */
  .bg-scene {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 20%, #1a103a 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, #0a2a3a 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, #0d1b2a 0%, #091526 100%);
  }
  .star {
    position: absolute; border-radius: 50%;
    background: white; animation: twinkle var(--dur) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%,100%{opacity:0;transform:scale(0.5)}
    50%{opacity:var(--op);transform:scale(1)}
  }
  .bubble {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent);
    border: 1px solid rgba(255,255,255,0.1);
    animation: float var(--dur) ease-in-out infinite;
    opacity: 0.15;
  }
  @keyframes float {
    0%,100%{transform:translateY(0) rotate(0deg)}
    50%{transform:translateY(-20px) rotate(5deg)}
  }

  /* Layout */
  #app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; gap: 14px; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: var(--radius); backdrop-filter: blur(12px);
  }
  .logo { font-family: 'Baloo 2', cursive; font-size: 1.4rem; font-weight: 800;
    background: linear-gradient(135deg, var(--teal), var(--pink), var(--lavender));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .jewel-bar { display: flex; align-items: center; gap: 6px; }
  .jewel-count {
    font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 800;
    color: var(--gold);
    display: flex; align-items: center; gap: 4px;
  }
  .jewel-icon { font-size: 1.3rem; filter: drop-shadow(0 0 6px var(--gold)); }
  .reset-btn {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 4px 10px; font-size: 0.75rem; color: var(--text-soft);
    cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.2s;
  }
  .reset-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.15); }

  /* Mode tabs */
  .mode-tabs {
    display: flex; gap: 8px;
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: var(--radius); padding: 6px; backdrop-filter: blur(12px);
  }
  .tab {
    flex: 1; padding: 10px 6px; border-radius: 14px; border: none;
    font-family: 'Baloo 2', cursive; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; transition: all 0.25s; color: var(--text-soft);
    background: transparent;
  }
  .tab.active {
    background: linear-gradient(135deg, var(--teal-dark), var(--pink-dark));
    color: white; box-shadow: 0 4px 15px rgba(45,212,199,0.3);
  }

  /* Settings panel */
  .settings {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: var(--radius); padding: 14px 16px; backdrop-filter: blur(12px);
    display: flex; flex-direction: column; gap: 12px;
  }
  .setting-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .setting-label { font-size: 0.85rem; font-weight: 700; color: var(--text-soft); }
  .pill-group { display: flex; gap: 5px; }
  .pill {
    padding: 6px 12px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.15);
    font-family: 'Baloo 2', cursive; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; color: var(--text-soft); background: transparent;
  }
  .pill.active {
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    border-color: var(--teal); color: white;
    box-shadow: 0 2px 12px rgba(45,212,199,0.4);
  }
  .toggle-switch {
    position: relative; width: 52px; height: 28px; cursor: pointer;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0; border-radius: 14px;
    background: rgba(255,255,255,0.1); transition: all 0.3s;
    border: 1.5px solid rgba(255,255,255,0.15);
  }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px; width: 20px; height: 20px;
    border-radius: 50%; background: var(--text-soft); transition: all 0.3s;
  }
  .toggle-switch input:checked ~ .toggle-track { background: var(--pink-dark); border-color: var(--pink); }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(24px); background: white; }

  /* Main word card */
  .word-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 28px; padding: 24px 20px; backdrop-filter: blur(12px);
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    position: relative; overflow: visible;
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.1);
    animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes cardIn {
    from { opacity:0; transform: scale(0.85) translateY(20px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  .word-emoji {
    font-size: 5rem; line-height: 1; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    cursor: pointer; transition: transform 0.2s;
    position: relative;
  }
  .word-emoji:active { transform: scale(0.9); }
  .hint-label {
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em;
    color: var(--text-soft); text-transform: uppercase;
  }
  .hint-btn {
    padding: 7px 18px; border-radius: 20px;
    background: rgba(196,181,253,0.15); border: 1.5px solid var(--lavender);
    color: var(--lavender); font-family: 'Baloo 2', cursive; font-size: 0.85rem;
    font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .hint-btn:active { background: rgba(196,181,253,0.3); transform: scale(0.97); }

  /* Word display (reading mode) */
  .word-display { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .letter-tile {
    width: 52px; height: 62px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
    font-family: 'Baloo 2', cursive; font-size: 2rem; font-weight: 800;
    cursor: pointer; transition: all 0.2s; position: relative; user-select: none;
    background: linear-gradient(135deg, rgba(45,212,199,0.2), rgba(244,114,182,0.2));
    border: 2px solid rgba(45,212,199,0.4);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
    color: white;
  }
  .letter-tile:active { transform: scale(0.9); }
  .letter-tile.zoomed {
    animation: zoomPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes zoomPop { from{transform:scale(0.5)} to{transform:scale(1)} }

  /* Zoom modal */
  .zoom-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .zoom-card {
    background: linear-gradient(135deg, #1a2a4a, #2a1a3a);
    border: 2px solid var(--lavender); border-radius: 32px;
    padding: 40px 50px; text-align: center;
    animation: zoomCardIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(196,181,253,0.2);
  }
  @keyframes zoomCardIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  .zoom-letter {
    font-family: 'Baloo 2', cursive; font-size: 8rem; font-weight: 800; line-height: 1;
    background: linear-gradient(135deg, var(--teal), var(--lavender), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .zoom-sound { font-size: 1.2rem; color: var(--text-soft); margin-top: 8px; font-weight: 700; }
  .zoom-close {
    margin-top: 24px; padding: 12px 32px; border-radius: 20px;
    background: linear-gradient(135deg, var(--teal-dark), var(--pink-dark));
    border: none; color: white; font-family: 'Baloo 2', cursive; font-size: 1rem;
    font-weight: 700; cursor: pointer;
  }

  /* Spelling mode */
  .spelling-word { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .spell-slot {
    width: 52px; height: 62px; border-radius: 14px;
    border: 2.5px dashed rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Baloo 2', cursive; font-size: 2rem; font-weight: 800;
    color: white; transition: all 0.3s;
  }
  .spell-slot.filled {
    background: linear-gradient(135deg, rgba(45,212,199,0.3), rgba(244,114,182,0.3));
    border-color: var(--teal); border-style: solid;
  }
  .spell-slot.correct { border-color: var(--mint); background: linear-gradient(135deg, rgba(110,231,183,0.3), rgba(45,212,199,0.3)); }
  .spell-slot.wrong { border-color: #f87171; background: rgba(248,113,113,0.2); animation: shake 0.4s; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)}
  }
  .spell-slot.active-slot { border-color: var(--gold); box-shadow: 0 0 15px rgba(251,191,36,0.5); border-style: solid; }

  .spell-choices { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
  .choice-btn {
    min-width: 52px; height: 52px; padding: 0 14px; border-radius: 14px;
    background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.15);
    font-family: 'Baloo 2', cursive; font-size: 1.6rem; font-weight: 800; color: white;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .choice-btn:active { transform: scale(0.9); }
  .choice-btn.correct-flash { background: rgba(110,231,183,0.4); border-color: var(--mint); }
  .choice-btn.wrong-flash { background: rgba(248,113,113,0.3); border-color: #f87171; }
  .choice-btn.word-choice {
    height: auto; padding: 12px 20px; font-size: 1.2rem; min-width: 100px; border-radius: 16px;
  }

  /* Spelling mode toggle */
  .spell-mode-toggle {
    display: flex; gap: 6px;
    background: rgba(255,255,255,0.05); border-radius: 14px; padding: 4px;
  }
  .spell-mode-btn {
    flex: 1; padding: 7px 10px; border-radius: 10px; border: none;
    font-family: 'Baloo 2', cursive; font-size: 0.8rem; font-weight: 700;
    cursor: pointer; color: var(--text-soft); background: transparent; transition: all 0.2s;
  }
  .spell-mode-btn.active {
    background: linear-gradient(135deg, var(--pink-dark), #9333ea);
    color: white;
  }

  /* Audio clue button */
  .audio-btn {
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(135deg, var(--sky), var(--teal));
    border: none; font-size: 1.8rem; cursor: pointer;
    box-shadow: 0 4px 20px rgba(125,211,252,0.4);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .audio-btn:active { transform: scale(0.9); }

  /* Next button */
  .next-btn {
    width: 100%; padding: 16px; border-radius: 18px; border: none;
    background: linear-gradient(135deg, var(--teal-dark), var(--pink-dark));
    color: white; font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 800;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(45,212,199,0.3);
    letter-spacing: 0.03em;
  }
  .next-btn:active { transform: scale(0.98); }

  /* Feedback */
  .feedback {
    text-align: center; font-family: 'Baloo 2', cursive; font-size: 1.3rem; font-weight: 800;
    padding: 12px 20px; border-radius: 16px;
    animation: feedbackPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes feedbackPop { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
  .feedback.correct { color: var(--mint); background: rgba(110,231,183,0.1); border: 1.5px solid rgba(110,231,183,0.3); }
  .feedback.wrong   { color: #fca5a5; background: rgba(248,113,113,0.1); border: 1.5px solid rgba(248,113,113,0.3); }

  /* Jewel celebration */
  .jewel-burst {
    position: fixed; inset: 0; pointer-events: none; z-index: 200;
  }
  .burst-gem {
    position: absolute; font-size: 2rem;
    animation: burstAnim 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  @keyframes burstAnim {
    0%   { opacity:1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity:0; transform: translate(var(--tx), var(--ty)) scale(0.3) rotate(var(--tr)); }
  }

  /* Section label */
  .section-label {
    font-size: 0.75rem; font-weight: 800; letter-spacing: 0.12em;
    color: var(--text-soft); text-transform: uppercase; text-align: center;
  }

  /* Frequency badge */
  .freq-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 12px;
    background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3);
    font-size: 0.75rem; font-weight: 700; color: var(--gold);
  }

  /* Score streak */
  .streak-bar {
    display: flex; gap: 6px; justify-content: center;
  }
  .streak-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .streak-dot.lit {
    background: var(--gold); border-color: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }
</style>
</head>

<div class="bg-scene" id="bgScene"></div>

<div id="app">
  <div class="header">
    <div class="logo">✨ Magic Words</div>
    <div class="jewel-bar">
      <div class="jewel-count"><span class="jewel-icon">💎</span><span id="jewelCount">0</span></div>
      <button class="reset-btn" onclick="resetJewels()">Reset</button>
    </div>
  </div>

  <div class="mode-tabs">
    <button class="tab active" onclick="setMode('reading')">📖 Reading</button>
    <button class="tab" onclick="setMode('spelling')">✏️ Spelling</button>
  </div>

  <div class="settings">
    <div class="setting-row">
      <span class="setting-label">Word length</span>
      <div class="pill-group" id="lengthPills">
        <button class="pill" onclick="setLength(3)">3</button>
        <button class="pill active" onclick="setLength(4)">4</button>
        <button class="pill" onclick="setLength(5)">5</button>
        <button class="pill" onclick="setLength(6)">6</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Sight words</span>
      <label class="toggle-switch">
        <input type="checkbox" id="sightToggle" onchange="updateWordPool()">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>

  <div id="mainContent"></div>
</div>

<!-- Zoom overlay -->
<div class="zoom-overlay" id="zoomOverlay" style="display:none" onclick="closeZoom()">
  <div class="zoom-card" onclick="event.stopPropagation()">
    <div class="zoom-letter" id="zoomLetter"></div>
    <div class="zoom-sound" id="zoomSound"></div>
    <button class="zoom-close" onclick="closeZoom()">✓ Got it!</button>
  </div>
</div>

<div class="jewel-burst" id="jewelBurst"></div>

};

const CORRECT_PHRASES = ['Amazing! 🌟','Brilliant! ✨','You got it! 🎉','Superstar! ⭐','Magic! 🦄','Wow! 💫'];
const WRONG_PHRASES   = ['Try again! 💪','Almost! 🌸','Keep going! 🐣','So close! 🌈'];

// ── State ────────────────────────────────────────────────────────────────
let jewels = parseInt(localStorage.getItem('mw_jewels') || '0');
let mode = 'reading';         // 'reading' | 'spelling'
let wordLength = 4;
let useSightWords = false;
let currentWord = null;
let currentEmoji = null;
let showHint = false;
let spellMode = 'letter';    // 'letter' | 'word'
let currentLetterIdx = 0;
let spelledSoFar = [];
let firstTry = true;
let lastWordWasSight = false;
let wordPool = [];

// ── Init ─────────────────────────────────────────────────────────────────
function init() {
  buildBackground();
  renderJewels();
  updateWordPool();
  nextWord();
}

function buildBackground() {
  const scene = document.getElementById('bgScene');
  for(let i=0;i<60;i++){
    const s = document.createElement('div');
    s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;
      width:${Math.random()*3+1}px;height:${s.style.width};
      --dur:${Math.random()*4+2}s;--op:${Math.random()*0.7+0.3};
      animation-delay:${Math.random()*5}s`;
    scene.appendChild(s);
  }
  for(let i=0;i<8;i++){
    const b = document.createElement('div');
    b.className='bubble';
    const sz = Math.random()*80+30;
    b.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;
      width:${sz}px;height:${sz}px;
      --dur:${Math.random()*8+6}s;animation-delay:${Math.random()*6}s`;
    scene.appendChild(b);
  }
}

function updateWordPool() {
  useSightWords = document.getElementById('sightToggle').checked;
  buildPool();
  nextWord();
}

function buildPool() {
  const vis = VISUAL_WORDS[wordLength] || [];
  const sight = (SIGHT_WORDS[wordLength] || []).map(w=>({w,e:null}));
  wordPool = useSightWords ? [...vis, ...sight] : vis;
  if(!wordPool.length) wordPool = vis;
}

function setLength(n) {
  wordLength = n;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  buildPool();
  nextWord();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', (i===0&&m==='reading')||(i===1&&m==='spelling'));
  });
  nextWord();
}

function nextWord() {
  if(!wordPool.length) buildPool();
  const item = wordPool[Math.floor(Math.random()*wordPool.length)];
  currentWord = item.w;
  currentEmoji = item.e;
  showHint = false;
  currentLetterIdx = 0;
  spelledSoFar = [];
  firstTry = true;
  lastWordWasSight = !item.e;
  render();
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('mainContent');
  if(mode === 'reading') el.innerHTML = renderReading();
  else                   el.innerHTML = renderSpelling();
}

function renderReading() {
  const isSight = !currentEmoji;
  return `
    <div class="word-card">
      ${isSight ? `<div class="freq-badge">👁️ Sight word</div>` : ''}
      <div class="word-emoji" onclick="playWordAudio('${currentWord}')">${currentEmoji||'💬'}</div>
      ${!isSight ? `<button class="hint-btn" onclick="toggleHint()">${showHint?'Hide hint 🙈':'Show hint 🐾'}</button>` : ''}
      ${showHint && !isSight ? `<div style="font-family:'Baloo 2',cursive;font-size:1.1rem;color:var(--text-soft);font-weight:700;">${currentWord}</div>` : ''}
      <div class="section-label">Tap a letter to zoom</div>
      <div class="word-display">${[...currentWord].map((l,i)=>`
        <div class="letter-tile" onclick="zoomLetter('${l}')">${l}</div>
      `).join('')}</div>
      <div style="height:6px"></div>
      <button class="next-btn" onclick="nextWord()">Next word ✨</button>
    </div>`;
}

function renderSpelling() {
  const isSight = !currentEmoji;
  const slots = [...currentWord].map((l,i) => {
    let cls = 'spell-slot';
    if(spelledSoFar[i] !== undefined){
      cls += spelledSoFar[i]===l ? ' filled correct' : ' filled wrong';
    } else if(i === currentLetterIdx) cls += ' active-slot';
    return `<div class="${cls}">${spelledSoFar[i]||''}</div>`;
  }).join('');

  const allDone = spelledSoFar.length === currentWord.length &&
                  spelledSoFar.every((l,i)=>l===currentWord[i]);

  return `
    <div class="word-card">
      ${isSight ? `<div class="freq-badge">👁️ Sight word</div>` : ''}
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%">
        <div style="display:flex;align-items:center;gap:12px">
          ${!isSight?`<div class="word-emoji" style="font-size:3.5rem">${currentEmoji}</div>`:''}
          <button class="audio-btn" onclick="playWordAudio('${currentWord}')">🔊</button>
        </div>
        <div class="spell-mode-toggle">
          <button class="spell-mode-btn ${spellMode==='letter'?'active':''}" onclick="setSpellMode('letter')">Letter by letter</button>
          <button class="spell-mode-btn ${spellMode==='word'?'active':''}" onclick="setSpellMode('word')">Whole word</button>
        </div>
      </div>
      <div class="spelling-word">${slots}</div>
      ${allDone ? `
        <div class="feedback correct">${CORRECT_PHRASES[Math.floor(Math.random()*CORRECT_PHRASES.length)]}</div>
        <button class="next-btn" onclick="nextWord()">Next word ✨</button>
      ` : renderChoices()}
    </div>`;
}

function renderChoices() {
  if(spellMode === 'letter') {
    const correct = currentWord[currentLetterIdx];
    const choices = getLetterChoices(correct);
    return `
      <div class="section-label">Pick letter ${currentLetterIdx+1}</div>
      <div class="spell-choices">${choices.map(c=>`
        <button class="choice-btn" id="cb_${c}" onclick="pickLetter('${c}')">${c}</button>
      `).join('')}</div>`;
  } else {
    const choices = getWordChoices(currentWord);
    return `
      <div class="section-label">Which word is it?</div>
      <div class="spell-choices">${choices.map(c=>`
        <button class="choice-btn word-choice" onclick="pickWord('${c}')">${c}</button>
      `).join('')}</div>`;
  }
}

function getLetterChoices(correct) {
  const alpha = 'abcdefghijklmnopqrstuvwxyz'.split('');
  const wrong = alpha.filter(l=>l!==correct).sort(()=>Math.random()-0.5).slice(0,3);
  return [correct,...wrong].sort(()=>Math.random()-0.5);
}

function getWordChoices(correct) {
  const pool = wordPool.filter(x=>x.w!==correct).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.w);
  return [correct,...pool].sort(()=>Math.random()-0.5);
}

// ── Interactions ──────────────────────────────────────────────────────────
function toggleHint() { showHint = !showHint; render(); }

function setSpellMode(m) { spellMode = m; spelledSoFar=[]; currentLetterIdx=0; firstTry=true; render(); }

function pickLetter(letter) {
  const correct = currentWord[currentLetterIdx];
  if(letter === correct) {
    spelledSoFar[currentLetterIdx] = letter;
    playTone(600,0.1);
    currentLetterIdx++;
    if(currentLetterIdx >= currentWord.length) {
      if(firstTry) awardJewel();
      render();
    } else render();
  } else {
    firstTry = false;
    playTone(200,0.15,'sawtooth');
    const btn = document.getElementById('cb_'+letter);
    if(btn){ btn.classList.add('wrong-flash'); setTimeout(()=>btn.classList.remove('wrong-flash'),400); }
  }
}

function pickWord(word) {
  if(word === currentWord) {
    spelledSoFar = [...currentWord];
    playTone(600,0.1);
    if(firstTry) awardJewel();
    render();
  } else {
    firstTry = false;
    playTone(200,0.15,'sawtooth');
    render();
  }
}

function zoomLetter(l) {
  document.getElementById('zoomLetter').textContent = l.toUpperCase();
  document.getElementById('zoomSound').textContent = `says "${LETTER_SOUNDS[l]||l}"`;
  document.getElementById('zoomOverlay').style.display = 'flex';
  speakText(l);
}
function closeZoom() { document.getElementById('zoomOverlay').style.display='none'; }

// ── Audio ─────────────────────────────────────────────────────────────────
const synth = window.speechSynthesis;
function speakText(text, rate=0.85) {
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = rate; u.pitch = 1.1; u.volume = 1;
  synth.speak(u);
}
function playWordAudio(word) { speakText(word, 0.8); }

let audioCtx = null;
function getAudioCtx() {
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, dur, type='sine') {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    osc.start(); osc.stop(ctx.currentTime+dur);
  } catch(e){}
}
function playCelebration() {
  const notes = [523,659,784,1047];
  notes.forEach((n,i)=>setTimeout(()=>playTone(n,0.15),i*120));
}

// ── Jewels ─────────────────────────────────────────────────────────────────
function awardJewel() {
  jewels++;
  localStorage.setItem('mw_jewels', jewels);
  renderJewels();
  playCelebration();
  burstGems();
}
function renderJewels() { document.getElementById('jewelCount').textContent = jewels; }
function resetJewels() {
  if(!confirm('Reset all your jewels? 💎')) return;
  jewels=0; localStorage.setItem('mw_jewels',0); renderJewels();
}
function burstGems() {
  const el = document.getElementById('jewelBurst');
  el.innerHTML='';
  const gems = ['💎','💜','💙','✨','⭐','🌟'];
  for(let i=0;i<12;i++){
    const g = document.createElement('div');
    g.className='burst-gem';
    g.textContent = gems[Math.floor(Math.random()*gems.length)];
    const angle = Math.random()*360;
    const dist = 80+Math.random()*120;
    g.style.cssText=`left:50%;top:50%;
      --tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;
      --tr:${Math.random()*360}deg;
      animation-delay:${Math.random()*0.2}s`;
    el.appendChild(g);
  }
  setTimeout(()=>el.innerHTML='',1400);
}

// ── Boot ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
